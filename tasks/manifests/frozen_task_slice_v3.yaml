manifest_id: frozen_task_slice_v3
description: Expanded frozen bundled Layer B probe slice covering substitution, compression, and reset suites.
tasks:
  - task_id: task-001
    repository: bundled/parser-defaults-microrepo
    title: Fix parser fallback
    issue_summary: Parser crashes when config key is absent. A fallback branch should preserve a default parser family.
    target_files:
      - src/parser.py
      - tests/test_parser.py
    test_command: pytest -q tests/test_parser.py
    task_assets_path: tasks/assets/task-001
    proxy_family_hint: parser-defaults
    resolving_family_keys: [parser-defaults]
    suite: substitution
    probe_purpose: Preserve a same-family resolving branch instead of retiring it in favor of a lure.
    target_hypotheses: [H2]
    primary_proxy_metrics:
      - represented_candidate_family_count_proxy
      - recoverable_candidate_count_proxy
      - avoidable_retirement_proxy
    suitable_backbones: [gemini, local_cpu]
  - task_id: task-002
    repository: bundled/auth-refresh-microrepo
    title: Preserve auth token refresh path
    issue_summary: Token refresh branch is retired too early when stale legacy state dominates.
    target_files:
      - auth/session.py
      - tests/test_session.py
    test_command: pytest -q tests/test_session.py
    task_assets_path: tasks/assets/task-002
    proxy_family_hint: auth-refresh
    resolving_family_keys: [auth-refresh]
    suite: reset
    probe_purpose: Probe whether reset recovers a dominated resolving branch under stale contamination.
    target_hypotheses: [H5]
    primary_proxy_metrics:
      - reset_helpfulness_proxy
      - stale_continuation_proxy
      - post_reset_resolution_improvement_proxy
    suitable_backbones: [gemini, local_cpu]
  - task_id: task-003
    repository: bundled/summary-cache-microrepo
    title: Reduce compression collisions in summary cache
    issue_summary: Cache summary merges distinct failure modes and hides the adequate branch.
    target_files:
      - cache/summary.py
      - tests/test_summary.py
    test_command: pytest -q tests/test_summary.py
    task_assets_path: tasks/assets/task-003
    proxy_family_hint: summary-cache
    resolving_family_keys: [summary-cache]
    suite: compression
    probe_purpose: Make alias-prone summarization compete against preserving recoverable families.
    target_hypotheses: [H3, H4]
    primary_proxy_metrics:
      - compression_collision_proxy
      - represented_candidate_family_count_proxy
      - recoverable_candidate_count_proxy
    suitable_backbones: [gemini, local_cpu]
  - task_id: task-004
    repository: bundled/checkpoint-resume-microrepo
    title: Reset stale checkpoint lineage
    issue_summary: A stale checkpoint chain dominates continuation even when a clean resume branch exists.
    target_files:
      - state/checkpoint.py
      - tests/test_checkpoint.py
    test_command: pytest -q tests/test_checkpoint.py
    task_assets_path: tasks/assets/task-004
    proxy_family_hint: checkpoint-resume
    resolving_family_keys: [checkpoint-resume]
    suite: reset
    probe_purpose: Favor reset when stale lineage keeps higher-scoring but contaminated branches active.
    target_hypotheses: [H5]
    primary_proxy_metrics:
      - reset_helpfulness_proxy
      - stale_continuation_proxy
      - post_reset_resolution_improvement_proxy
    suitable_backbones: [gemini, local_cpu]
  - task_id: task-005
    repository: bundled/serializer-defaults-microrepo
    title: Preserve serializer defaults
    issue_summary: A cheaper same-family serializer default should survive instead of being displaced by a fastpath lure.
    target_files:
      - serialize/config.py
      - tests/test_serialize.py
    test_command: pytest -q tests/test_serialize.py
    task_assets_path: tasks/assets/task-005
    proxy_family_hint: serializer-defaults
    resolving_family_keys: [serializer-defaults]
    suite: substitution
    probe_purpose: Reward same-family substitution and penalize avoidable retirement of the resolving family.
    target_hypotheses: [H2]
    primary_proxy_metrics:
      - represented_candidate_family_count_proxy
      - recoverable_candidate_count_proxy
      - avoidable_retirement_proxy
    suitable_backbones: [gemini, local_cpu]
  - task_id: task-006
    repository: bundled/planner-reset-microrepo
    title: Reset stale planner state
    issue_summary: Planner continuation clings to a legacy route when a fresh replan branch should be recovered.
    target_files:
      - planner/state.py
      - tests/test_planner_state.py
    test_command: pytest -q tests/test_planner_state.py
    task_assets_path: tasks/assets/task-006
    proxy_family_hint: planner-reset
    resolving_family_keys: [planner-reset]
    suite: reset
    probe_purpose: Distinguish stale continuation from helpful reset when the replan family is archived.
    target_hypotheses: [H5]
    primary_proxy_metrics:
      - reset_helpfulness_proxy
      - stale_continuation_proxy
      - post_reset_resolution_improvement_proxy
    suitable_backbones: [gemini, local_cpu]
  - task_id: task-007
    repository: bundled/digest-routing-microrepo
    title: Separate digest routes before summary collapse
    issue_summary: A digest summary collapses timeout and parser failure routes, creating alias-heavy compression pressure.
    target_files:
      - digest/router.py
      - tests/test_router.py
    test_command: pytest -q tests/test_router.py
    task_assets_path: tasks/assets/task-007
    proxy_family_hint: digest-routing
    resolving_family_keys: [digest-routing]
    suite: compression
    probe_purpose: Stress compression-heavy control with multiple recoverable branches that are easy to alias.
    target_hypotheses: [H3, H4]
    primary_proxy_metrics:
      - compression_collision_proxy
      - represented_candidate_family_count_proxy
      - recoverable_candidate_count_proxy
    suitable_backbones: [gemini, local_cpu]
  - task_id: task-008
    repository: bundled/worker-reset-microrepo
    title: Reset worker lease lineage
    issue_summary: A worker lease keeps replaying stale state when a fresh reset branch should take over.
    target_files:
      - workers/lease.py
      - tests/test_lease.py
    test_command: pytest -q tests/test_lease.py
    task_assets_path: tasks/assets/task-008
    proxy_family_hint: worker-reset
    resolving_family_keys: [worker-reset]
    suite: reset
    probe_purpose: Create a transparent case where reset can improve post-reset resolution proxies.
    target_hypotheses: [H5]
    primary_proxy_metrics:
      - reset_helpfulness_proxy
      - stale_continuation_proxy
      - post_reset_resolution_improvement_proxy
    suitable_backbones: [gemini, local_cpu]
